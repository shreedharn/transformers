site_name: Introduction to Transformers 
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tabs
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.diagrams
    - content.mermaid
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: JetBrains Mono
plugins:
  - search
  - mermaid2
  - awesome-pages
  - roamlinks         # keep if you use [[Wiki Links]]; safe to leave on
markdown_extensions:
  # core niceties
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      # make exceptions to highlighting of code:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
          separator: "-"
extra_javascript:
  - javascripts/mathjax-init.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/mathjax-refresh.js
  - https://unpkg.com/mermaid@10.2.4/dist/mermaid.min.js
  - javascripts/mermaid-init.js
extra_css:
  - styles.css
docs_dir: docs
nav:
  - Neural Network Introduction: nn_intro.md
  - Building Networks with MLP: mlp_intro.md
  - Sequential Modeling with RNN: rnn_intro.md
  - Transformers Fundamentals: transformers_fundamentals.md
  - Transformers Advanced: transformers_advanced.md
  - Knowledge Store: knowledge_store.md
  - References:
      - PyTorch Primer: pytorch_ref.md
      - Mathematical Foundations 1: transformers_math1.md
      - Mathematical Foundations 2: transformers_math2.md
      - Mathematical Quick Reference: math_quick_ref.md
      - Sequence Modeling History: history_quick_ref.md
  - Glossary: glossary.md
  - README: README.md
  - LICENSE: LICENSE.md
  - Further: further.md



